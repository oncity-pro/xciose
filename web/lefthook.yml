pre-commit:
  parallel: true
  commands:
    code-workspace:
      run: echo "跳过校验，正常提交"
    lint-md:
      run: echo "跳过"
      glob: '*.md'
    lint-vue:
      run: echo "跳过"
      glob: '*.vue'
    lint-js:
      run: echo "跳过"
      glob: '*.{js,jsx,ts,tsx}'
    lint-style:
      run: echo "跳过"
      glob: '*.{scss,less,styl,html,vue,css}'
    lint-package:
      run: echo "跳过"
      glob: 'package.json'
    lint-json:
      run: echo "跳过"
      glob: '{!(package)*.json,*.code-snippets,.!(browserslist)*rc}'

post-merge:
  commands:
    install:
      run: echo "跳过"

commit-msg:
  commands:
    commitlint:
      run: echo "跳过提交信息校验"
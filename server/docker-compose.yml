version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: oncity_mysql
    restart: always
    environment:
      MYSQL_DATABASE: oncity_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USER:-oncity_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-oncity_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - oncity_network

  web:
    build: .
    container_name: oncity_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 oncity_backend.wsgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=oncity_db
      - DB_USER=${DB_USER:-oncity_user}
      - DB_PASSWORD=${DB_PASSWORD:-oncity_password}
      - DB_HOST=db
      - DB_PORT=3306
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oncity_network

volumes:
  mysql_data:
  static_volume:
  media_volume:

networks:
  oncity_network:
    driver: bridge
